name: bai_market
description: "Cosmetics App"
publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  flutter_native_splash: ^2.4.5
  flutter_svg: ^2.0.17
  dio: ^5.8.0+1
  shared_preferences: ^2.5.2
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  json_annotation: ^4.9.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  mask_text_input_formatter: ^2.9.0
  webview_flutter: ^4.11.0
  webview_flutter_wkwebview: ^3.20.0
  awesome_notifications: ^0.10.1
  pin_code_fields: ^8.0.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.0.7
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  share_plus: ^10.1.4

# path_provider_foundation 2.6.0 pulls the objective_c FFI package, whose
# dylib fails to load on the iOS simulator (runtime dlopen error). 2.5.1 is
# the last version before that dependency and works fine for our usage.
dependency_overrides:
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.15

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/icons/notification_icons/
    - assets/icons/notification/
    - assets/icons/main_page/
    - assets/icons/main_menu/
    - assets/icons/common/
    - assets/icons/product_page/
    - assets/icons/profile_page/
    - assets/icons/cart_page/

  fonts:
    - family: Gilroy
      fonts:
        - asset: fonts/Gilroy-Heavy.ttf
          weight: 900
        - asset: fonts/Gilroy-Extrabold.ttf
          weight: 800
        - asset: fonts/Gilroy-Bold.ttf
          weight: 700
        - asset: fonts/Gilroy-Semibold.ttf
          weight: 600
        - asset: fonts/Gilroy-Medium.ttf
          weight: 500
        - asset: fonts/Gilroy-Regular.ttf
          weight: 400
        - asset: fonts/Gilroy-Light.ttf
          weight: 300

flutter_native_splash:
  color: "#3DBFAD"
  android_12:
    color: "#3DBFAD"
    icon_background_color: "#3DBFAD"

  android: true
  ios: true

# Add l10n configuration
flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated
# flutter gen-l10n
# dart pub global run flutterfire_cli:flutterfire configure
# flutter pub run build_runner build --delete-conflicting-outputs

